name: motion-rehab-coach
options:
  minimumXcodeGenVersion: 2.38.0
  defaultConfig: Debug
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: 1,2
targets:
  motion-rehab-coach:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankaya.motionrehabcoach
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MotionRehabCoach
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSCameraUsageDescription: Motion Rehab Coach uses the camera to analyze body pose for exercise feedback.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Motion Rehab Coach saves optional session snapshots for clinical review.
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        CODE_SIGN_STYLE: Automatic
    scheme:
      gatherCoverageData: true
      testTargets:
        - motion-rehab-coachTests
  motion-rehab-coachTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: motion-rehab-coach
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  motion-rehab-coach-tv:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: TVSources
      - path: Sources/Domain/Models/PoseFrame.swift
      - path: Sources/Domain/Models/PosePoint.swift
      - path: Sources/Domain/Protocols/PoseEstimating.swift
      - path: Sources/Infrastructure/Pose/VisionPoseEstimator.swift
      - path: Sources/Presentation/Components/CameraPreviewView.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankaya.motionrehabcoach.tv
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MotionRehabCoachTV
        INFOPLIST_KEY_NSCameraUsageDescription: Motion Rehab Coach TV uses Continuity Camera to display posture coaching on Apple TV.
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        CODE_SIGN_STYLE: Automatic
    scheme:
      gatherCoverageData: false
